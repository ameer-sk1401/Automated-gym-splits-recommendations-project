<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Daily Gym Split</title>
    <style>
      body {
        font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        padding: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .meta {
        color: #6b7280;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .item {
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 8px;
      }
      .name {
        font-weight: 600;
      }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 8px;
        text-decoration: none;
        background: #111827;
        color: white;
        font-weight: 600;
        font-size: 14px;
      }
      .muted {
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">{{ title }}</p>
      <p class="meta">
        Hi {{ name }}, here’s your plan for <strong>{{ date }}</strong>.
      </p>

      {% for it in items %}
      <div class="item">
        <div class="name">{{ it.name }}</div>
        <div class="muted">
          Sets: {{ it.sets }} &nbsp; • &nbsp; Reps: {{ it.reps }}
        </div>
        <p><a class="btn" href="{{ it.link }}">Mark done</a></p>
      </div>
      {% endfor %}

      <p>
        <a class="btn" href="{{ complete_all_link }}">Mark all done</a>
      </p>

      <p class="muted">Tip: these links are unique to you for today.</p>
    </div>
  </body>
</html>
