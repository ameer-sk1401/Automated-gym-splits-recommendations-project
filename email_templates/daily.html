<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Create Workout Split - Planet Fitness Style</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Arial, sans-serif;
        background: linear-gradient(
          135deg,
          #1a1a1a 0%,
          #2d2d2d 50%,
          #1a1a1a 100%
        );
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 700px;
      }

      .card {
        background: rgba(45, 45, 45, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
        position: relative;
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .subtitle {
        color: #cccccc;
        font-size: 16px;
        font-weight: 500;
      }

      /* Added form styling for workout split creation */
      .form-section {
        margin-bottom: 32px;
        padding: 24px;
        background: linear-gradient(135deg, #8b2f97, #6b1b7f);
        border-radius: 16px;
        border: 2px solid rgba(255, 215, 0, 0.3);
        position: relative;
        overflow: hidden;
      }

      .form-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #ffd700, #ffa500);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        color: #8b7355;
        font-weight: 700;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: #ffd700;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
      }

      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      .exercise-entry {
        background: rgba(0, 0, 0, 0.3);
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .exercise-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        gap: 12px;
        align-items: end;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 25px;
        text-decoration: none;
        background: linear-gradient(135deg, #ffd700, #ffa500);
        color: #4a1458;
        font-weight: 700;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        border: none;
        cursor: pointer;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(255, 215, 0, 0.4);
        background: linear-gradient(135deg, #ffa500, #ffd700);
      }

      .btn-small {
        padding: 8px 16px;
        font-size: 12px;
        border-radius: 20px;
      }

      .btn-danger {
        background: linear-gradient(135deg, #dc3545, #c82333);
        color: white;
        box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
      }

      .btn-danger:hover {
        background: linear-gradient(135deg, #c82333, #dc3545);
        box-shadow: 0 6px 16px rgba(220, 53, 69, 0.4);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #666666, #888888);
        color: white;
        box-shadow: 0 4px 12px rgba(102, 102, 102, 0.3);
      }

      .btn-secondary:hover {
        background: linear-gradient(135deg, #888888, #666666);
        box-shadow: 0 6px 16px rgba(102, 102, 102, 0.4);
      }

      .day-header {
        color: white;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .add-exercise-btn {
        width: 100%;
        margin-top: 12px;
      }

      .form-actions {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 40px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-primary {
        background: linear-gradient(135deg, #ffd700, #ffa500);
        color: #4a1458;
        padding: 16px 32px;
        font-size: 16px;
        border-radius: 30px;
        box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
      }

      .btn-outline {
        background: transparent;
        color: #ffd700;
        border: 2px solid #ffd700;
        padding: 14px 28px;
        font-size: 15px;
        border-radius: 25px;
      }

      .btn-outline:hover {
        background: linear-gradient(135deg, #ffd700, #ffa500);
        color: #4a1458;
        border-color: transparent;
        transform: translateY(-1px);
      }

      /* Better add day button styling */
      .add-day-section {
        text-align: center;
        margin: 32px 0;
        padding: 20px;
        border: 2px dashed rgba(255, 215, 0, 0.3);
        border-radius: 16px;
        background: rgba(255, 215, 0, 0.05);
      }

      .btn-add-day {
        background: linear-gradient(135deg, #27ae60, #2ecc71);
        color: white;
        padding: 14px 28px;
        font-size: 15px;
        border-radius: 25px;
        box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
      }

      .btn-add-day:hover {
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        transform: translateY(-1px);
      }

      /* Improved header button styling for better visual appeal */
      .header-btn {
        position: absolute;
        top: -10px;
        padding: 12px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .header-btn:hover {
        transform: translateY(-2px);
      }

      .header-btn-left {
        left: 0;
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        color: white;
        box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
      }

      .header-btn-left:hover {
        background: linear-gradient(135deg, #c0392b, #e74c3c);
        box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
      }

      .header-btn-right {
        right: 0;
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
      }

      .header-btn-right:hover {
        background: linear-gradient(135deg, #2980b9, #3498db);
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
      }

      @media (max-width: 640px) {
        .header-btn {
          position: static;
          display: block;
          margin: 8px auto 16px;
          width: fit-content;
        }

        .card {
          padding: 24px;
          margin: 10px;
        }

        .title {
          font-size: 24px;
        }

        .exercise-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .form-actions {
          flex-direction: column;
          gap: 16px;
        }

        /* Better mobile spacing for add day section */
        .add-day-section {
          margin: 24px 0;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="header">
          <!-- Updated button text and icons for better UX -->
          <button class="header-btn header-btn-left" onclick="deleteActivity()">
            <span>🗑️</span> Delete Activity
          </button>
          <button
            class="header-btn header-btn-right"
            onclick="customizeSession()"
          >
            <span>⚙️</span> Customize Session
          </button>

          <h1 class="title">Create Workout Split</h1>
          <p class="subtitle">Design your custom training program</p>
        </div>

        <!-- Added workout split creation form -->
        <form id="workoutSplitForm">
          <div id="workoutDays">
            <!-- Day 1 Template -->
            <div class="form-section" data-day="1">
              <div class="day-header">Day 1</div>

              <div class="form-group">
                <label class="form-label">Day Name</label>
                <input
                  type="text"
                  class="form-input"
                  name="dayName[]"
                  placeholder="e.g., Monday, Push Day, Upper Body"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Body Part(s) Trained</label>
                <input
                  type="text"
                  class="form-input"
                  name="bodyPart[]"
                  placeholder="e.g., Chest & Triceps, Legs, Back & Biceps"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Exercises</label>
                <div class="exercises-container">
                  <div class="exercise-entry">
                    <div class="exercise-row">
                      <input
                        type="text"
                        class="form-input"
                        name="exerciseName[1][]"
                        placeholder="Exercise name"
                        required
                      />
                      <input
                        type="number"
                        class="form-input"
                        name="sets[1][]"
                        placeholder="Sets"
                        min="1"
                        required
                      />
                      <input
                        type="text"
                        class="form-input"
                        name="reps[1][]"
                        placeholder="Reps"
                        required
                      />
                      <button
                        type="button"
                        class="btn btn-small btn-danger"
                        onclick="removeExercise(this)"
                      >
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
                <button
                  type="button"
                  class="btn btn-secondary add-exercise-btn"
                  onclick="addExercise(1)"
                >
                  + Add Exercise
                </button>
              </div>
            </div>
          </div>

          <!-- Improved add day section with better visual hierarchy -->
          <div class="add-day-section">
            <p style="color: #cccccc; margin-bottom: 16px; font-size: 14px">
              Need more training days?
            </p>
            <button type="button" class="btn btn-add-day" onclick="addDay()">
              <span>➕</span> Add Another Day
            </button>
          </div>

          <!-- Redesigned form actions with primary and secondary button hierarchy -->
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <span>💾</span> Save Workout Split
            </button>
            <button
              type="button"
              class="btn btn-outline"
              onclick="previewSplit()"
            >
              <span>👁️</span> Preview Split
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Added JavaScript for dynamic form functionality -->
    <script>
      let dayCount = 1;

      function addDay() {
        dayCount++;
        const workoutDays = document.getElementById("workoutDays");
        const newDay = document.createElement("div");
        newDay.className = "form-section";
        newDay.setAttribute("data-day", dayCount);

        newDay.innerHTML = `
          <div class="day-header">
            Day ${dayCount}
            <button type="button" class="btn btn-small btn-danger" style="float: right;" onclick="removeDay(this)">Remove Day</button>
          </div>
          
          <div class="form-group">
            <label class="form-label">Day Name</label>
            <input type="text" class="form-input" name="dayName[]" placeholder="e.g., Monday, Push Day, Upper Body" required>
          </div>

          <div class="form-group">
            <label class="form-label">Body Part(s) Trained</label>
            <input type="text" class="form-input" name="bodyPart[]" placeholder="e.g., Chest & Triceps, Legs, Back & Biceps" required>
          </div>

          <div class="form-group">
            <label class="form-label">Exercises</label>
            <div class="exercises-container">
              <div class="exercise-entry">
                <div class="exercise-row">
                  <input type="text" class="form-input" name="exerciseName[${dayCount}][]" placeholder="Exercise name" required>
                  <input type="number" class="form-input" name="sets[${dayCount}][]" placeholder="Sets" min="1" required>
                  <input type="text" class="form-input" name="reps[${dayCount}][]" placeholder="Reps" required>
                  <button type="button" class="btn btn-small btn-danger" onclick="removeExercise(this)">Remove</button>
                </div>
              </div>
            </div>
            <button type="button" class="btn btn-secondary add-exercise-btn" onclick="addExercise(${dayCount})">+ Add Exercise</button>
          </div>
        `;

        workoutDays.appendChild(newDay);
      }

      function removeDay(button) {
        if (document.querySelectorAll(".form-section").length > 1) {
          button.closest(".form-section").remove();
        } else {
          alert("You must have at least one day in your workout split!");
        }
      }

      function addExercise(dayNumber) {
        const day = document.querySelector(`[data-day="${dayNumber}"]`);
        const exercisesContainer = day.querySelector(".exercises-container");

        const newExercise = document.createElement("div");
        newExercise.className = "exercise-entry";
        newExercise.innerHTML = `
          <div class="exercise-row">
            <input type="text" class="form-input" name="exerciseName[${dayNumber}][]" placeholder="Exercise name" required>
            <input type="number" class="form-input" name="sets[${dayNumber}][]" placeholder="Sets" min="1" required>
            <input type="text" class="form-input" name="reps[${dayNumber}][]" placeholder="Reps" required>
            <button type="button" class="btn btn-small btn-danger" onclick="removeExercise(this)">Remove</button>
          </div>
        `;

        exercisesContainer.appendChild(newExercise);
      }

      function removeExercise(button) {
        const exercisesContainer = button.closest(".exercises-container");
        if (exercisesContainer.children.length > 1) {
          button.closest(".exercise-entry").remove();
        } else {
          alert("Each day must have at least one exercise!");
        }
      }

      function previewSplit() {
        const formData = new FormData(
          document.getElementById("workoutSplitForm")
        );
        console.log("[v0] Preview functionality - form data collected");
        alert("Preview functionality would show your workout split here!");
      }

      document
        .getElementById("workoutSplitForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          console.log("[v0] Form submitted - workout split data collected");
          alert(
            "Workout split saved successfully! This would integrate with your backend."
          );
        });

      /* Added functions for header buttons */
      function deleteActivity() {
        if (
          confirm(
            "Are you sure you want to delete this activity? This action cannot be undone."
          )
        ) {
          console.log("[v0] Delete activity confirmed");
          alert("Activity deleted successfully!");
        }
      }

      function customizeSession() {
        console.log("[v0] Customize session clicked");
        alert("Customize session functionality would open here!");
      }
    </script>
  </body>
</html>
