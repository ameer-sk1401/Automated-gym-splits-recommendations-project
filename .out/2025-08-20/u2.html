<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Daily Gym Split</title>
    <style>
      body {
        font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        padding: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .meta {
        color: #6b7280;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .item {
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 8px;
      }
      .name {
        font-weight: 600;
      }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 8px;
        text-decoration: none;
        background: #111827;
        color: white;
        font-weight: 600;
        font-size: 14px;
      }
      .muted {
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">Legs Day</p>
      <p class="meta">
        Hi Charan, here’s your plan for <strong>2025-08-20</strong>.
      </p>

      
      <div class="item">
        <div class="name">Back Squat</div>
        <div class="muted">
          Sets: 4 &nbsp; • &nbsp; Reps: 5-8
        </div>
        <p><a class="btn" href="https://example.com/submit?u=u2&d=2025-08-20&ex=squat">Mark done</a></p>
      </div>
      
      <div class="item">
        <div class="name">Romanian Deadlift</div>
        <div class="muted">
          Sets: 3 &nbsp; • &nbsp; Reps: 8-10
        </div>
        <p><a class="btn" href="https://example.com/submit?u=u2&d=2025-08-20&ex=rdl">Mark done</a></p>
      </div>
      
      <div class="item">
        <div class="name">Walking Lunges</div>
        <div class="muted">
          Sets: 3 &nbsp; • &nbsp; Reps: 10 each
        </div>
        <p><a class="btn" href="https://example.com/submit?u=u2&d=2025-08-20&ex=lunges">Mark done</a></p>
      </div>
      

      <p>
        <a class="btn" href="https://example.com/submit?u=u2&d=2025-08-20&ex=ALL">Mark all done</a>
      </p>

      <p class="muted">Tip: these links are unique to you for today.</p>
    </div>
  </body>
</html>
